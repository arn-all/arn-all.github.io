<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Error 404 :(</title>

    <script>
        window.onload = function () {
            const destination = window.location.href;
            if (destination.includes("arn-all.github.io/milady-docs")) {
                const redirectLocation = destination.replace(
                    "arn-all.github.io/milady-docs",
                    "ai-atoms.github.io/milady-docs"
                );
                document.getElementById("body").innerHTML = "Milady docs has moved into an organization repository. <br/><br/>Redirecting to " + redirectLocation + " ...";
                window.location.href = redirectLocation;
            }
        }
    </script>
</head>

<body id="body" style="text-align: center">
    Page not found
</body>

</html>
